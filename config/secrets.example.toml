# Copy to config/secrets.toml (gitignored). Env vars win over this file:
#   EARWORM_INGEST_SECRET, EARWORM_FEED_TOKEN, CLOUDFLARE_API_TOKEN
#
# Only needed if you publish to the optional Cloudflare feed. Local-only renders
# need none of this.
#
# Generate strong values:  openssl rand -hex 32

[cloudflare]
# API token with R2 Storage Edit + D1 Edit + Workers Scripts Edit + Account Read.
# Used by wrangler (deploy, d1, r2) and by the renderer's R2 uploads.
api_token = ""

[feed]
ingest_secret = ""   # must match the worker's INGEST_SECRET (wrangler secret put)
feed_token = ""      # must match the worker's FEED_TOKEN; used to build the subscribe URL
