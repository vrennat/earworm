Dynadot = "dňąIn…ôdňĆ…Ďt"      # DYE-nuh-dot
Namecheap = "nňąAm ßňĆip"     # NAME-cheep
Pheenix = "fňąin…™ks"        # FEE-nix (the drop-catcher, said like "phoenix")

