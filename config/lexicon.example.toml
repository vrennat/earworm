# Pronunciation overrides applied before synthesis (Kokoro/misaki).
# Copy to config/lexicon.toml and add your own entries.
#
# Each entry maps a whole word (case-sensitive) to misaki modified-IPA; the
# renderer rewrites it to `[word](/ipa/)`, which Kokoro honors down to the audio.
#
# misaki modified-IPA notation:
#   capital O = "oh" diphthong, I = "eye", A = "ay"; ňą = primary stress, ňĆ = secondary.
#   …Ļ = American r, √į = "th" (this), őł = "th" (thin).
# Tip (avoid guessing): phonemize a word it ALREADY says right and copy the output:
#   .venv/bin/python -c "from misaki import en; print(en.G2P(trf=False)('red')[0])"
# WARNING: misaki does not validate the IPA ‚ÄĒ wrong symbols produce garbled audio.
#
# The entries below are a useful starting set for a tech/AI show. Trim or extend
# to fit your subject matter.

[words]
Kokoro = "kňąOk…ô…ĻO"
exile = "ňą…õksa…™l"          # "EKS-ile" ‚ÄĒ misaki's default ňą…õ…°zňĆIl voices the s as a z

# Rhetoric / debate terms ‚ÄĒ misaki reduces the "man" in the one-word compounds
# to a schwa ("steelman" -> stňąilm…ôn). Force a clear "man" (mňĆ√¶n).
steelman = "stňąil mňĆ√¶n"
"steel man" = "stňąil mňĆ√¶n"
strawman = "st…Ļňą…Ē mňĆ√¶n"
"straw man" = "st…Ļňą…Ē mňĆ√¶n"

